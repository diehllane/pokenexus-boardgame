<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeNexus Board Game</title>
<style>
  :root {
    --theme: #c62828;
    --theme-dark: #8e0000;
    --theme-light: #ff5f52;
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --tile: 60px;
    --font-size-tile: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  #header {
    background: linear-gradient(135deg, var(--theme-dark), var(--bg2));
    border-bottom: 2px solid var(--theme);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  #title-img { max-height: 56px; object-fit: contain; display: none; }
  #title-text h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px var(--theme-light);
    color: #fff;
  }
  #title-text p { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  #event-meta {
    margin-left: auto;
    text-align: right;
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.6;
  }
  #event-meta strong { color: var(--theme-light); font-size: 0.9rem; }

  /* ── TOOLBAR ── */
  #toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    background: var(--theme);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--theme-light); }
  .btn.secondary { background: var(--bg3); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--border); }
  #status-msg { font-size: 0.78rem; color: var(--text-muted); }
  #tile-slider-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-left: auto;
  }
  #tile-slider { accent-color: var(--theme); width: 90px; }
  #tile-label { min-width: 38px; text-align: right; font-size: 0.78rem; color: var(--text); }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    gap: 0;
    align-items: flex-start;
  }
  #board-wrap {
    flex: 1;
    overflow-x: auto;
    padding: 16px;
  }
  #board {
    display: grid;
    gap: 2px;
    width: fit-content;
  }

  /* ── SQUARES ── */
  .sq {
    width: var(--tile);
    height: var(--tile);
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.1s;
    font-size: var(--font-size-tile);
  }
  .sq:hover { transform: scale(1.12); z-index: 10; box-shadow: 0 0 12px var(--theme); border-color: var(--theme-light); }
  .sq .sq-num { position: absolute; top: 2px; left: 3px; font-size: 8px; opacity: 0.45; font-weight: 600; }
  .sq .sq-arrow { position: absolute; bottom: 1px; right: 3px; font-size: 7px; opacity: 0.35; }
  .sq .sq-icon { font-size: calc(var(--tile) * 0.28); line-height: 1; }
  .sq .sq-label { font-size: calc(var(--tile) * 0.11); text-align: center; line-height: 1.1; padding: 0 2px; margin-top: 2px; font-weight: 600; word-break: break-word; max-width: 100%; }
  .sq .sq-players { display: flex; flex-wrap: wrap; gap: 1px; justify-content: center; margin-top: 1px; max-width: calc(var(--tile) - 4px); }
  .sq .player-dot {
    width: calc(var(--tile) * 0.18);
    height: calc(var(--tile) * 0.18);
    border-radius: 50%;
    font-size: calc(var(--tile) * 0.1);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    flex-shrink: 0;
  }

  /* Square type colors */
  .sq-start    { background: linear-gradient(135deg,#1b5e20,#2e7d32); border-color: #66bb6a; }
  .sq-finish   { background: linear-gradient(135deg,#4a148c,#6a1b9a); border-color: #ce93d8; animation: pulse-finish 2s infinite; }
  .sq-center   { background: linear-gradient(135deg,#01579b,#0277bd); border-color: #4fc3f7; }
  .sq-elite    { background: linear-gradient(135deg,#bf360c,#d84315); border-color: #ff8a65; }
  .sq-gym      { background: linear-gradient(135deg,#1a237e,#283593); border-color: #7986cb; }
  .sq-prize    { background: linear-gradient(135deg,#f57f17,#f9a825); border-color: #fff176; }
  .sq-bonus-jump  { background: linear-gradient(135deg,#1b5e20,#388e3c); border-color: #a5d6a7; border-style: dashed; }
  .sq-penalty-jump{ background: linear-gradient(135deg,#b71c1c,#c62828); border-color: #ef9a9a; border-style: dashed; }
  .sq-bonus-small { background: linear-gradient(135deg,#004d40,#00695c); border-color: #80cbc4; }
  .sq-penalty-small{background: linear-gradient(135deg,#880e4f,#ad1457); border-color: #f48fb1; }
  .sq-flavor   { background: var(--bg3); border-color: var(--border); }
  .sq-plain    { background: var(--bg2); }

  @keyframes pulse-finish {
    0%,100% { box-shadow: 0 0 6px #ce93d8; }
    50% { box-shadow: 0 0 18px #e040fb, 0 0 30px #7b1fa2; }
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    min-width: 200px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    padding: 14px 12px;
    min-height: calc(100vh - 100px);
  }
  #sidebar h2 { font-size: 0.85rem; font-weight: 700; color: var(--theme-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .player-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
    font-size: 0.78rem;
  }
  .player-card .pname { font-weight: 700; font-size: 0.82rem; margin-bottom: 4px; }
  .player-card .ppos  { color: var(--text-muted); margin-bottom: 4px; }
  .player-card .pbadges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .badge-chip {
    background: var(--theme);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 0.65rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-count { display: inline-block; background: var(--bg); color: var(--theme-light); border-radius: 10px; padding: 1px 7px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--theme); margin-bottom: 4px; }

  /* ── POPUP ── */
  #popup {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--theme);
    border-radius: 10px;
    padding: 14px 16px;
    max-width: 280px;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  #popup h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--theme-light); }
  #popup .popup-meta { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 6px; }
  #popup .popup-players { margin-top: 6px; }
  #popup .popup-players span { display: inline-block; background: var(--theme); border-radius: 8px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; margin: 2px 2px 0 0; }
  #popup-close { position: absolute; top: 8px; right: 10px; cursor: pointer; opacity: 0.5; font-size: 1rem; }
  #popup-close:hover { opacity: 1; }

  /* ── LOADING ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    font-size: 1.1rem;
    color: var(--text-muted);
    gap: 10px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--theme);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LEGEND ── */
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
  }
  .leg { display: flex; align-items: center; gap: 4px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Error banner */
  #error-bar {
    display: none;
    background: #b71c1c;
    color: #fff;
    padding: 8px 16px;
    font-size: 0.82rem;
    text-align: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <img id="title-img" src="" alt="Game Logo">
  <div id="title-text">
    <h1 id="title-h1">PokeNexus Board Game</h1>
    <p id="title-sub"></p>
  </div>
  <div id="event-meta">
    <div id="day-counter"></div>
    <div id="countdown"></div>
  </div>
</div>

<!-- ERROR BAR -->
<div id="error-bar"></div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="btn" onclick="loadData()">⟳ Refresh Board</button>
  <span id="status-msg">Loading…</span>
  <div id="tile-slider-wrap">
    <span>Tile size:</span>
    <input type="range" id="tile-slider" min="36" max="120" step="4" value="60" oninput="onTileSlide(this.value)">
    <span id="tile-label">60px</span>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="board-wrap">
    <div id="loading"><div class="spinner"></div> Loading board data…</div>
    <div id="board" style="display:none"></div>
  </div>
  <div id="sidebar" style="display:none">
    <h2>🏅 Badge Board</h2>
    <div id="player-list"></div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#2e7d32"></div>Start</div>
  <div class="leg"><div class="leg-dot" style="background:#6a1b9a"></div>Finish</div>
  <div class="leg"><div class="leg-dot" style="background:#0277bd"></div>Pokémon Center</div>
  <div class="leg"><div class="leg-dot" style="background:#d84315"></div>Elite 4</div>
  <div class="leg"><div class="leg-dot" style="background:#283593"></div>Gym</div>
  <div class="leg"><div class="leg-dot" style="background:#f9a825"></div>Prize</div>
  <div class="leg"><div class="leg-dot" style="background:#388e3c;border:1px dashed #a5d6a7"></div>Bonus Jump</div>
  <div class="leg"><div class="leg-dot" style="background:#c62828;border:1px dashed #ef9a9a"></div>Penalty Jump</div>
  <div class="leg"><div class="leg-dot" style="background:#00695c"></div>+Bonus</div>
  <div class="leg"><div class="leg-dot" style="background:#ad1457"></div>−Penalty</div>
</div>

<!-- POPUP -->
<div id="popup">
  <span id="popup-close" onclick="closePopup()">✕</span>
  <h3 id="popup-title"></h3>
  <div class="popup-meta" id="popup-meta"></div>
  <div id="popup-desc"></div>
  <div class="popup-players" id="popup-players"></div>
</div>

<script>
// ─────────────────────────────────────────────
// APPS SCRIPT URL — replace with your deployed URL
// ─────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxgIV9JMGa5-uT2OEoEbkkaSfXbl2uC1VIXGsvIQNYpGvl3Hqtkgl9RHggYoUVZPPU/exec';

// ─────────────────────────────────────────────
// HARDCODED FALLBACK DEFAULTS
// All of these are overridden by GameConfig rows in BoardConfig tab
// ─────────────────────────────────────────────
let CFG = {
  GameTitle:         'PokeNexus Board Game',
  GameSubtitle:      '',
  TitleImageURL:     '',
  TrackLength:       252,
  GridColumns:       18,
  TileSize:          60,
  ScoreDivisor:      2,
  ScoreOperation:    'divide',
  ScoreRoundingMode: 'ceil',
  MaxMovesPerDay:    0,
  ThemeColor:        '#c62828',
  EventStartDate:    '',
  EventEndDate:      '',
  BadgeBonusEnabled: true,
  ShowBadgeSidebar:  true,
  ShowFlavorText:    true,
};

// Player colors (cycles for unlimited players)
const PLAYER_COLORS = [
  '#e53935','#1e88e5','#43a047','#fb8c00',
  '#8e24aa','#00acc1','#e91e63','#6d4c41',
  '#546e7a','#f4511e','#039be5','#7cb342',
];

// State
let boardConfig = {};   // squareNum → config object
let flavorText  = {};   // squareNum → string
let players     = [];   // [{name, position, badges:[]}]
let tileSliderOverride = null; // null = use sheet value

// ─────────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function showError(msg) {
  const el = document.getElementById('error-bar');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function applyTheme(color) {
  // Derive dark/light variants from hex
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  const dark  = `rgb(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)})`;
  const light = `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
  document.documentElement.style.setProperty('--theme', color);
  document.documentElement.style.setProperty('--theme-dark', dark);
  document.documentElement.style.setProperty('--theme-light', light);
}

function applyTileSize(px) {
  const size = parseInt(px);
  document.documentElement.style.setProperty('--tile', size + 'px');
  document.documentElement.style.setProperty('--font-size-tile', Math.max(7, Math.floor(size * 0.13)) + 'px');
  document.getElementById('tile-label').textContent = size + 'px';
  document.getElementById('tile-slider').value = size;
}

function onTileSlide(val) {
  tileSliderOverride = parseInt(val);
  applyTileSize(val);
}

function scoreToMoves(rawScore) {
  let val = parseFloat(rawScore) || 0;
  if (CFG.ScoreOperation === 'multiply') {
    val = val * CFG.ScoreDivisor;
  } else {
    val = val / CFG.ScoreDivisor;
  }
  if (CFG.ScoreRoundingMode === 'floor') val = Math.floor(val);
  else if (CFG.ScoreRoundingMode === 'round') val = Math.round(val);
  else val = Math.ceil(val);
  if (CFG.MaxMovesPerDay > 0) val = Math.min(val, CFG.MaxMovesPerDay);
  return Math.max(0, val);
}

function daysBetween(d1, d2) {
  const ms = d2 - d1;
  return Math.floor(ms / 86400000);
}

function updateEventMeta() {
  const counter  = document.getElementById('day-counter');
  const countdown = document.getElementById('countdown');
  const now = new Date();

  if (CFG.EventStartDate) {
    const start = new Date(CFG.EventStartDate + 'T00:00:00');
    const day = daysBetween(start, now) + 1;
    if (day >= 1) counter.innerHTML = `<strong>Day ${day}</strong> of event`;
    else counter.innerHTML = `<strong>Starts ${CFG.EventStartDate}</strong>`;
  }
  if (CFG.EventEndDate) {
    const end = new Date(CFG.EventEndDate + 'T23:59:59');
    const remaining = daysBetween(now, end);
    if (remaining > 0) countdown.textContent = `${remaining} days remaining`;
    else if (remaining === 0) countdown.textContent = 'Last day!';
    else countdown.textContent = 'Event ended';
  }
}

function updateHeader() {
  document.title = CFG.GameTitle || 'PokeNexus Board Game';
  document.getElementById('title-h1').textContent = CFG.GameTitle || 'PokeNexus Board Game';
  document.getElementById('title-sub').textContent = CFG.GameSubtitle || '';

  const img = document.getElementById('title-img');
  const txt = document.getElementById('title-text');
  if (CFG.TitleImageURL) {
    img.src = CFG.TitleImageURL;
    img.style.display = 'block';
    txt.style.display = 'none';
  } else {
    img.style.display = 'none';
    txt.style.display = 'block';
  }

  applyTheme(CFG.ThemeColor || '#c62828');
  updateEventMeta();

  // Tile size: slider override takes priority, then sheet value
  if (tileSliderOverride === null) {
    applyTileSize(CFG.TileSize || 60);
  }

  document.getElementById('sidebar').style.display = CFG.ShowBadgeSidebar ? 'block' : 'none';
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
async function loadData() {
  setStatus('Fetching…');
  showError('');
  document.getElementById('board').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
    const data = await res.json();
    parseData(data);
    renderBoard();
    renderSidebar();
    updateHeader();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('board').style.display = 'grid';
    setStatus('Updated ' + new Date().toLocaleTimeString());
  } catch(e) {
    setStatus('Error loading data');
    showError('Could not load data from Google Sheets. Check your Apps Script URL and CORS settings. ' + e.message);
    document.getElementById('loading').style.display = 'none';
  }
}

function parseData(data) {
  boardConfig = {};
  flavorText  = {};
  players     = [];

  // Safe cell reader — always returns a string, never throws
  const str = (v) => (v === null || v === undefined) ? '' : String(v).trim();
  const num = (v, fallback) => { const n = parseFloat(str(v)); return isFinite(n) ? n : fallback; };
  const bool = (v, fallback) => {
    const s = str(v).toLowerCase();
    if (s === 'false' || s === '0') return false;
    if (s === 'true'  || s === '1') return true;
    return fallback;
  };

  // Reset CFG to hardcoded defaults
  CFG = {
    GameTitle: 'PokeNexus Board Game', GameSubtitle: '',
    TitleImageURL: '', TrackLength: 252, GridColumns: 18, TileSize: 60,
    ScoreDivisor: 2, ScoreOperation: 'divide', ScoreRoundingMode: 'ceil',
    MaxMovesPerDay: 0, ThemeColor: '#c62828',
    EventStartDate: '', EventEndDate: '',
    BadgeBonusEnabled: true, ShowBadgeSidebar: true, ShowFlavorText: true,
  };

  // ── BoardConfig rows ──
  if (data.boardConfig && Array.isArray(data.boardConfig)) {
    data.boardConfig.forEach(row => {
      if (!Array.isArray(row) || row.length < 2) return;

      const type = str(row[1]).toLowerCase();

      // GameConfig row — col B = "config", col C = key, col D = value
      if (type === 'config') {
        const key = str(row[2]);
        if (!key) return;
        const rawVal = row[3]; // may be number, bool, or string from Sheets
        const strVal = str(rawVal);

        const numKeys  = ['TrackLength','GridColumns','TileSize','ScoreDivisor','MaxMovesPerDay'];
        const boolKeys = ['BadgeBonusEnabled','ShowBadgeSidebar','ShowFlavorText'];

        if (numKeys.includes(key)) {
          const n = num(rawVal, null);
          if (n !== null) CFG[key] = n;
        } else if (boolKeys.includes(key)) {
          CFG[key] = bool(rawVal, CFG[key]);
        } else if (strVal !== '') {
          CFG[key] = strVal;
        }
        return;
      }

      // Square row — col A = square number
      const sqNum = parseInt(str(row[0]));
      if (isNaN(sqNum)) return;

      boardConfig[sqNum] = {
        type:        type,
        label:       str(row[2]),
        icon:        str(row[3]),
        jumpTo:      parseInt(str(row[4])) || null,
        moveAmount:  parseInt(str(row[5])) || 0,
        description: str(row[6]),
        badge:       str(row[7]),
      };
    });
  }

  // Validate critical config values — clamp to sane ranges
  CFG.TrackLength  = Math.max(1,  CFG.TrackLength);
  CFG.GridColumns  = Math.max(1,  CFG.GridColumns);
  CFG.TileSize     = Math.max(24, Math.min(200, CFG.TileSize));
  CFG.ScoreDivisor = CFG.ScoreDivisor || 1;

  // ── FlavorText rows ──
  if (data.flavorText && Array.isArray(data.flavorText)) {
    data.flavorText.forEach(row => {
      if (!Array.isArray(row)) return;
      const sqNum = parseInt(str(row[0]));
      if (!isNaN(sqNum)) flavorText[sqNum] = str(row[1]);
    });
  }

  // ── Players rows ──
  if (data.players && Array.isArray(data.players)) {
    data.players.forEach((row, i) => {
      if (!Array.isArray(row)) return;
      const name = str(row[0]);
      if (!name || name.toLowerCase() === 'playername') return;
      const position = Math.min(Math.max(0, parseInt(str(row[3])) || 0), CFG.TrackLength);
      players.push({
        name,
        position,
        color: PLAYER_COLORS[i % PLAYER_COLORS.length],
        badges: [],
      });
    });
  }

  // Calculate badges
  if (CFG.BadgeBonusEnabled) {
    players.forEach(p => {
      p.badges = [];
      Object.entries(boardConfig).forEach(([sq, conf]) => {
        if (conf.type === 'gym' && parseInt(sq) <= p.position) {
          p.badges.push(conf.badge || conf.label);
        }
      });
    });
  }

  // Debug — remove after confirming working
  console.log('CFG:', CFG);
  console.log('boardConfig keys:', Object.keys(boardConfig).length, 'squares loaded');
  console.log('players:', players.length, 'loaded');
  console.log('flavorText keys:', Object.keys(flavorText).length);
}

// ─────────────────────────────────────────────
// BOARD RENDERING
// ─────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = Math.max(1, CFG.GridColumns);
  const total = CFG.TrackLength;
  board.style.gridTemplateColumns = `repeat(${cols}, var(--tile))`;

  // Build square index: sqNum → list of players
  const playerPos = {};
  players.forEach(p => {
    if (!playerPos[p.position]) playerPos[p.position] = [];
    playerPos[p.position].push(p);
  });

  // Build grid cells for squares 0 → TrackLength
  for (let sq = 0; sq <= total; sq++) {
    const row = Math.floor(sq / cols);
    const col = sq % cols;
    const rtl  = row % 2 === 1; // right-to-left rows
    const displayCol = rtl ? (cols - 1 - col) : col;

    // Direction arrow
    let arrow = '→';
    if (col === cols - 1 && !rtl) arrow = '↓';
    if (col === 0 && rtl) arrow = '↓';
    if (rtl) arrow = '←';
    if (sq === total) arrow = '🏆';

    const conf = boardConfig[sq] || {};
    const typeClass = conf.type ? `sq-${conf.type}` : 'sq-plain';
    const icon  = conf.icon  || defaultIcon(conf.type, sq, total);
    const label = conf.label || (sq === 0 ? 'Start' : sq === total ? 'FINISH' : '');

    const div = document.createElement('div');
    div.className = `sq ${typeClass}`;
    div.style.gridColumn = displayCol + 1;
    div.style.gridRow    = row + 1;
    div.dataset.sq = sq;

    // Content
    let html = `<span class="sq-num">${sq}</span>`;
    if (icon)  html += `<span class="sq-icon">${icon}</span>`;
    if (label) html += `<span class="sq-label">${label}</span>`;

    // Players on this square
    const here = playerPos[sq] || [];
    if (here.length) {
      html += `<div class="sq-players">`;
      here.forEach(p => {
        html += `<div class="player-dot" style="background:${p.color}" title="${p.name}">${p.name[0].toUpperCase()}</div>`;
      });
      html += `</div>`;
    }

    html += `<span class="sq-arrow">${arrow}</span>`;
    div.innerHTML = html;
    div.addEventListener('click', (e) => showPopup(sq, e));
    board.appendChild(div);
  }
}

function defaultIcon(type, sq, total) {
  if (sq === 0)     return '🚩';
  if (sq === total) return '🏆';
  switch(type) {
    case 'gym':          return '🏟️';
    case 'center':       return '🏥';
    case 'elite':        return '⚔️';
    case 'prize':        return '🎁';
    case 'bonus-jump':   return '⬆️';
    case 'penalty-jump': return '⬇️';
    case 'bonus-small':  return '✨';
    case 'penalty-small':return '💥';
    default: return '';
  }
}

// ─────────────────────────────────────────────
// SIDEBAR RENDERING
// ─────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';

  // Sort by position descending
  const sorted = [...players].sort((a,b) => b.position - a.position || b.badges.length - a.badges.length);
  sorted.forEach((p, rank) => {
    const pct = Math.round((p.position / CFG.TrackLength) * 100);
    const medals = ['🥇','🥈','🥉'];
    const card = document.createElement('div');
    card.className = 'player-card';
    card.style.borderLeft = `3px solid ${p.color}`;
    card.innerHTML = `
      <div class="pname">${medals[rank] || '▸'} ${p.name}</div>
      <div class="ppos">Square ${p.position} / ${CFG.TrackLength} (${pct}%)</div>
      <div>
        <span class="badge-count">🏅 ${p.badges.length} badge${p.badges.length !== 1 ? 's' : ''}</span>
      </div>
      ${p.badges.length ? `<div class="pbadges">${p.badges.map(b => `<span class="badge-chip">${b}</span>`).join('')}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────
function showPopup(sq, event) {
  const popup = document.getElementById('popup');
  const conf  = boardConfig[sq] || {};
  const flavor = CFG.ShowFlavorText ? (flavorText[sq] || '') : '';

  document.getElementById('popup-title').textContent =
    conf.label || (sq === 0 ? 'Start' : sq === CFG.TrackLength ? 'Finish!' : `Square ${sq}`);

  let meta = `Square #${sq}`;
  if (conf.type) meta += ` · ${conf.type}`;
  if (conf.badge) meta += ` · ${conf.badge}`;
  document.getElementById('popup-meta').textContent = meta;

  let desc = conf.description || '';
  if (conf.type === 'bonus-jump' && conf.jumpTo) desc += `\n⬆️ Jump to square ${conf.jumpTo}`;
  if (conf.type === 'penalty-jump' && conf.jumpTo) desc += `\n⬇️ Sent back to square ${conf.jumpTo}`;
  if (conf.type === 'bonus-small' && conf.moveAmount) desc += `\n+${conf.moveAmount} bonus squares`;
  if (conf.type === 'penalty-small' && conf.moveAmount) desc += `\n−${Math.abs(conf.moveAmount)} penalty squares`;
  if (flavor) desc += (desc ? '\n\n' : '') + flavor;

  document.getElementById('popup-desc').textContent = desc;

  const here = players.filter(p => p.position === sq);
  const pp = document.getElementById('popup-players');
  if (here.length) {
    pp.innerHTML = '<strong>Players here:</strong><br>' +
      here.map(p => `<span style="background:${p.color}">${p.name}</span>`).join('');
  } else { pp.innerHTML = ''; }

  // Position popup near click but keep in viewport
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = event.clientX + 12, y = event.clientY + 12;
  popup.style.display = 'block';
  const pw = popup.offsetWidth, ph = popup.offsetHeight;
  if (x + pw > vw - 10) x = event.clientX - pw - 12;
  if (y + ph > vh - 10) y = event.clientY - ph - 12;
  popup.style.left = Math.max(8, x) + 'px';
  popup.style.top  = Math.max(8, y) + 'px';
}

function closePopup() { document.getElementById('popup').style.display = 'none'; }
document.addEventListener('click', e => {
  if (!e.target.closest('.sq') && !e.target.closest('#popup')) closePopup();
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);
</script>
